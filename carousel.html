<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>發光圖片循環效果</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: transparent;
      font-family: Arial, sans-serif;
    }
    
    .container {
      text-align: center;
      padding: 2rem;
      position: relative;
      width: 400px;
      aspect-ratio: 16/9;
    }
    
    img {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      aspect-ratio: 16/9;
      border-radius: 10px;
    }
    
    /* 透明的孩子3.png - 5秒闪烁 */
    .logo3 {
      filter: drop-shadow(0 0 15px #ffd700) drop-shadow(0 0 30px rgba(255, 215, 0, 0.6));
      animation: sparkle3 17s infinite;
    }
    
    @keyframes sparkle3 {
      /* 0-5秒: 闪烁 */
      0% {
        opacity: 1;
        filter: drop-shadow(0 0 15px #ffd700) drop-shadow(0 0 30px rgba(255, 215, 0, 0.6));
      }
      5% {
        opacity: 0.5;
        filter: drop-shadow(0 0 25px #ffffff) drop-shadow(0 0 40px rgba(255, 215, 0, 0.8));
      }
      10% {
        opacity: 1;
        filter: drop-shadow(0 0 15px #ffd700) drop-shadow(0 0 30px rgba(255, 215, 0, 0.6));
      }
      15% {
        opacity: 0.5;
        filter: drop-shadow(0 0 25px #ffffff) drop-shadow(0 0 40px rgba(255, 215, 0, 0.8));
      }
      20% {
        opacity: 1;
        filter: drop-shadow(0 0 15px #ffd700) drop-shadow(0 0 30px rgba(255, 215, 0, 0.6));
      }
      25% {
        opacity: 0.5;
        filter: drop-shadow(0 0 25px #ffffff) drop-shadow(0 0 40px rgba(255, 215, 0, 0.8));
      }
      29.4% {
        opacity: 1;
      }
      /* 5-29.4秒: 隐藏 (给其他logo显示) */
      29.4%,
      100% {
        opacity: 0;
        pointer-events: none;
      }
    }
    
    /* 主視覺logo - 淡入淡出 */
    .main-logo {
      animation: mainLogoTransition 17s infinite;
    }
    
    @keyframes mainLogoTransition {
      /* 0-29.4%: 隐藏 */
      0%,
      29.4% {
        opacity: 0;
        pointer-events: none;
      }
      /* 29.4%-35.3%: 淡入1秒 */
      29.4%,
      35.3% {
        opacity: 1;
        pointer-events: auto;
      }
      /* 35.3%-64.7%: 显示5秒 */
      64.7% {
        opacity: 1;
      }
      /* 64.7%-70.6%: 淡出1秒 */
      70.6% {
        opacity: 0;
      }
      /* 70.6%-100%: 隐藏 */
      100% {
        opacity: 0;
        pointer-events: none;
      }
    }
    
    /* 透明的孩子s.png - 5秒闪烁 */
    .logos {
      filter: drop-shadow(0 0 15px #ffd700) drop-shadow(0 0 30px rgba(255, 215, 0, 0.6));
      animation: sparkles 17s infinite;
    }
    
    @keyframes sparkles {
      /* 0-70.6%: 隐藏 */
      0%,
      70.6% {
        opacity: 0;
        pointer-events: none;
      }
      /* 70.6%-100%: 闪烁5秒 */
      70.6% {
        opacity: 1;
        filter: drop-shadow(0 0 15px #ffd700) drop-shadow(0 0 30px rgba(255, 215, 0, 0.6));
      }
      76.5% {
        opacity: 0.5;
        filter: drop-shadow(0 0 25px #ffffff) drop-shadow(0 0 40px rgba(255, 215, 0, 0.8));
      }
      82.4% {
        opacity: 1;
        filter: drop-shadow(0 0 15px #ffd700) drop-shadow(0 0 30px rgba(255, 215, 0, 0.6));
      }
      88.2% {
        opacity: 0.5;
        filter: drop-shadow(0 0 25px #ffffff) drop-shadow(0 0 40px rgba(255, 215, 0, 0.8));
      }
      94.1% {
        opacity: 1;
        filter: drop-shadow(0 0 15px #ffd700) drop-shadow(0 0 30px rgba(255, 215, 0, 0.6));
      }
      100% {
        opacity: 0.5;
        filter: drop-shadow(0 0 25px #ffffff) drop-shadow(0 0 40px rgba(255, 215, 0, 0.8));
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 透明的孩子3.png - 5秒闪烁 -->
    <img class="logo3" src="https://raw.githubusercontent.com/isufilmtv12nd-web/testing/main/LOGO們/透明的孩子3.png" alt="透明的孩子3">
    
    <!-- 主視覺logo - 淡入淡出5秒 -->
    <img class="main-logo" src="https://raw.githubusercontent.com/isufilmtv12nd-web/testing/main/LOGO們/主視覺logo.png" alt="主視覺logo">
    
    <!-- 透明的孩子s.png - 5秒闪烁 -->
    <img class="logos" src="https://raw.githubusercontent.com/isufilmtv12nd-web/testing/main/LOGO們/透明的孩子s.png" alt="透明的孩子s">
  </div>
</body>
</html>
